openapi: 3.0.0
info:
  title: Booking API
  version: 1.0.0
paths:
  /booking:
    post:
      responses:
        '200':
          description: Booking created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookingid:
                    type: integer
                  booking:
                    type: object
                    properties:
                      firstname:
                        type: string
                      lastname:
                        type: string
                      totalprice:
                        type: integer
                      depositpaid:
                        type: boolean
                      bookingdates:
                        type: object
                        properties:
                          checkin:
                            type: string
                          checkout:
                            type: string
                      additionalneeds:
                        type: string
  /booking/{id}:
    put:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Booking updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookingid:
                    type: integer
                  booking:
                    type: object
                    properties:
                      firstname:
                        type: string
                      lastname:
                        type: string
                      totalprice:
                        type: integer
                      depositpaid:
                        type: boolean
                      bookingdates:
                        type: object
                        properties:
                          checkin:
                            type: string
                          checkout:
                            type: string
                      additionalneeds:
                        type: string
